<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خاص مع الشوين</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
</head>
<body>
    <header class="fixed top-0 left-0 w-full bg-transparent p-4 sm:p-6">
        <nav class="flex justify-between items-center">
            <a href="#" class="block w-20 h-12 bg-gray-800 rounded-lg font-bold text-white text-2xl flex items-center justify-center">
                <span class="lg:block hidden">خاص مع الشوين</span>
                <span class="lg:hidden block font-bold text-2xl text-white">ش</span>
            </a>
            <ul class="flex justify-end items-center">
                <li class="mx-4">
                    <button class="bg-red-600 hover:bg-red-500 py-2 px-4 rounded-lg text-white">
                        Get Started
                    </button>
                </li>
            </ul>
        </nav>
    </header>
    <main class="mt-24 md:mt-32 bg-gray-800 bg-opacity-5 min-h-screen">
        <section class="relative h-screen md:h-auto py-24">
            <div class="container px-6 py-12 sm:px-12 max-w-6xl mx-auto text-gray-800">
                <h1 class="text-4xl sm:text-5xl md:text-6xl xl:text-7xl font-extrabold leading-tight text-gray-900">
                    تعرف على أروع الأعمال
                </h1>
                <p class="text-gray-600">
                    اكتشف ما يزيد من ديكور بيوكي الحلو
                </p>
                <button class="bg-red-600 hover:bg-red-500 py-3 px-8 rounded-lg text-white mt-6">
                    Get Started
                </button>
                <img class="w-full h-screen md:h-auto object-cover object-center" src="https://source.unsplash.com/featured/?خاص مع الشوين">
            </div>
        </section>
        <section class="container px-6 py-12 sm:px-12 max-w-6xl mx-auto text-gray-800 mt-24">
            <h2 class="text-3xl sm:text-4xl md:text-5xl xl:text-6xl font-bold leading-tight mb-6">
                Services
            </h2>
            <div class="flex flex-wrap justify-center">
                <div class="w-full md:w-1/2 lg:w-1/3 md:p-4 p-6 mb-6 lg:mb-0">
                    <div class="hover:shadow-lg hover:scale-105 transition duration-300 border border-gray-300 border-2 rounded-lg text-center">
                        <h3 class="text-2xl sm:text-3xl font-bold mb-2">Services 1</h3>
                        <p class="text-gray-600">Descibe service 1</p>
                    </div>
                </div>
                <div class="w-full md:w-1/2 lg:w-1/3 md:p-4 p-6 mb-6 lg:mb-0">
                    <div class="hover:shadow-lg hover:scale-105 transition duration-300 border border-gray-300 border-2 rounded-lg text-center">
                        <h3 class="text-2xl sm:text-3xl font-bold mb-2">Services 2</h3>
                        <p class="text-gray-600">Descibe service 2</p>
                    </div>
                </div>
                <div class="w-full md:w-1/2 lg:w-1/3 md:p-4 p-6">
                    <div class="hover:shadow-lg hover:scale-105 transition duration-300 border border-gray-300 border-2 rounded-lg text-center">
                        <h3 class="text-2xl sm:text-3xl font-bold mb-2">Services 3</h3>
                        <p class="text-gray-600">Descibe service 3</p>
                    </div>
                </div>
            </div>
        </section>
        <button class="fixed bottom-0 right-0 p-2 w-12 h-12 z-50 bg-green-600 hover:bg-green-500 rounded-lg text-white">
            <i class="fab fa-whatsapp text-white font-bold text-2xl"></i>
        </button>
        <section class="container px-6 py-12 sm:px-12 max-w-6xl mx-auto text-gray-800 mt-24">
            <h2 class="text-3xl sm:text-4xl md:text-5xl xl:text-6xl font-bold leading-tight mb-6">
                Contact
            </h2>
            <form class="w-full max-w-lg mx-auto bg-white text-gray-600 shadow-md rounded-lg p-8">
                <div class="flex flex-wrap -mx-3 mb-6">
                    <div class="w-full md:w-1/2 px-3 mb-6 md:mb-0">
                        <label class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2">
                            Email
                        </label>
                        <input class="appearance-none block w-full bg-gray-200 text-gray-700 border border-gray-200 rounded py-3 px-4 leading-tight focus:outline-none focus:bg-white focus:border-gray-500" type="email" placeholder="البريد الإلكتروني">
                    </div>
                    <div class="w-full md:w-1/2 px-3 mb-6 md:mb-0">
                        <label class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2">
                            رقم الهاتف المحمول
                        </label>
                        <input class="appearance-none block w-full bg-gray-200 text-gray-700 border border-gray-200 rounded py-3 px-4 leading-tight focus:outline-none focus:bg-white focus:border-gray-500" type="tel" placeholder="رقم هاتفك">
                    </div>
                </div>
                <div class="flex flex-wrap -mx-3 mb-6">
                    <div class="w-full px-3">
                        <label class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2">
                            الرسالة
                        </label>
                        <textarea class="no-resize appearance-none block w-full bg-gray-200 text-gray-700 border border-gray-200 rounded py-3 px-4 leading-tight focus:outline-none focus:bg-white focus:border-gray-500" placeholder="أدخل رسالتك"></textarea>
                    </div>
                </div>
                <button class="bg-red-600 hover:bg-red-500 py-2 px-4 rounded-lg text-white">
                    أرسل
                </button>
            </form>
        </section>
    </main>
    <footer class="bg-transparent p-4 sm:p-6">
        <p class="text-gray-600 text-center">
            صُنع بذكاء بواسطة براندو
        </p>
    </footer>
    <script src="https://kit.fontawesome.com/0ab0ea8bb0.js" crossorigin="anonymous"></script>
</body>
</html>
